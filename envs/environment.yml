name: geospatial
channels:
  - conda-forge
  - defaults
dependencies:
  # --- Core ---
  - python=3.12
 
  # --- Geo stack (conda-forge handles C-level DLL coordination) ---
  - gdal
  - rasterio
  - geopandas
  - shapely
  - fiona
  - odc-stac
  - pystac-client
  - pystac=1.11.0
  - openeo
  - planetary-computer
  - leafmap
 
  # --- Data / ML ---
  - numpy
  - pandas
  - pyarrow
  - scikit-learn
  - scipy
  - statsmodels
  - dask
  - xarray
  - duckdb
 
  # --- Viz ---
  - matplotlib
  - plotly
  - seaborn
  - folium
 
  # --- Dev/Test ---
  - pytest
  - jsonschema
 
  # --- Pip-only packages (conda-forge doesn't package these well) ---
  - pip
  - pip:
    - mlflow==3.11.1
    - apache-airflow
    - sktime==0.40.1
    - mlforecast==1.0.31
    - optuna==4.8.0
    - xgboost==3.2.0
    - utilsforecast           
    - python-dotenv
    - pydantic>=2.0,<3.0      # pin to avoid fastapi compat issues
    - fastapi>=0.100,<0.116   # pin to known pydantic-v2 compatible range
    - streamlit==1.44.0
    - streamlit-folium==0.27.1
